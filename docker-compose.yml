services:

  frontend:
    image: vasanthmano/frontedphp12:latest
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    image: image: 945219712738.dkr.ecr.us-east-1.amazonaws.com/myapp1_backend:${IMAGE_TAG:-latest}
    container_name: backend
    ports:
      - "8080:80"
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: task_manager
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: