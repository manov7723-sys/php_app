name: CD - Deploy to EC2

on:
  workflow_run:
    workflows: ["CI - Build and Push to ECR"]
    types:
      - completed

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 945219712738.dkr.ecr.us-east-1.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to EC2 via Docker Compose
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set image tag (first 8 digits of commit SHA)
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Clone repo if not exists, else pull latest
            if [ ! -d "/home/ubuntu/php_app" ]; then
              git clone https://github.com/manov7723-sys/php_app.git /home/ubuntu/php_app
            fi

            cd /home/ubuntu/php_app

            # Pull latest code
            git pull origin main

            # Login to ECR
            aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS \
            --password-stdin 945219712738.dkr.ecr.us-east-1.amazonaws.com

            # Make IMAGE_TAG available to docker-compose
            export IMAGE_TAG=${{ env.IMAGE_TAG }}

            # Pull updated images from ECR and recreate containers
            docker compose pull
            docker compose up -d --force-recreate

            # Cleanup old images
            docker image prune -f

            echo "✅ Deployed successfully with tag: ${{ env.IMAGE_TAG }}"