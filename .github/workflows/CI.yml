name: CI - Build and Push to ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  BACKEND_REPO: myapp1_backend
  FRONTEND_REPO: myapp1_frontend

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
 
  # JOB 1 — BUILD AND PUSH BACKEND
 
  build-backend:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set image tag (first 8 digits of commit SHA)
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Build and push backend Docker image
        run: |
          IMAGE="945219712738.dkr.ecr.us-east-1.amazonaws.com/${{ env.BACKEND_REPO }}"
    
          # Build image with version tag and latest
          docker build -t $IMAGE:${{ env.IMAGE_TAG }} -t $IMAGE:latest ./backend

          # Push both tags
          docker push $IMAGE:${{ env.IMAGE_TAG }}
          docker push $IMAGE:latest

          # Print image URLs
          echo "✅ Backend pushed:"
          echo "   → $IMAGE:${{ env.IMAGE_TAG }}"
          echo "   → $IMAGE:latest"
 
  # JOB 2 — BUILD AND PUSH FRONTEND
 
  build-frontend:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set image tag (first 8 digits of commit SHA)
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Build and push frontend Docker image
        run: |
          IMAGE="945219712738.dkr.ecr.us-east-1.amazonaws.com/${{ env.FRONTEND_REPO }}"
    
          # Build image with version tag and latest
          docker build -t $IMAGE:${{ env.IMAGE_TAG }} -t $IMAGE:latest ./frontend

          # Push both tags
          docker push $IMAGE:${{ env.IMAGE_TAG }}
          docker push $IMAGE:latest

          # Print image URLs
          echo "✅ Frontend pushed:"
          echo "   → $IMAGE:${{ env.IMAGE_TAG }}"
          echo "   → $IMAGE:latest"